# TenantSentry.ai — Red Flag Rules
# Core IP. Enrich as you learn from real leases.
#
# jurisdictions: list of state codes this rule applies to, or ["ALL"]
#   Rules are filtered per-audit so VIC-specific rules don't fire on NSW leases.
#   Use ["ALL"] for rules that apply in every Australian jurisdiction.

rules:

  - id: RF001
    name: Above-market rent review
    severity: high
    jurisdictions: ["ALL"]
    description: >
      Rent review mechanism allows increases exceeding CPI + 2% per annum,
      or uses a ratchet clause preventing downward review to market.
      Ratchet clauses are void in NSW, VIC, and ACT by statute; in other
      states they are challengeable under the ACL unfair contract terms regime.
    trigger_keywords: ["rent review", "CPI", "fixed increase", "ratchet", "not less than"]
    legislation_ref: "Retail Leases Act 1994 (NSW) s.35 | Retail Leases Act 2003 (VIC) s.35 | Leases (Commercial and Retail) Act 2001 (ACT)"
    recommended_action: >
      Negotiate to cap rent reviews at the lesser of CPI or a fixed percentage (e.g. 4%).
      Remove any ratchet clause preventing downward adjustment on market reviews.
      Ensure CPI references the correct capital city index for the jurisdiction.

  - id: RF002
    name: Demolition/redevelopment clause without compensation
    severity: high
    jurisdictions: ["ALL"]
    description: >
      Landlord can terminate the lease for demolition or redevelopment
      without providing adequate compensation to the tenant.
    trigger_keywords: ["demolition", "redevelopment", "terminate", "vacant possession", "structural works"]
    legislation_ref: null
    recommended_action: >
      Negotiate minimum 6-month written notice and compensation covering:
      unamortised fitout costs, relocation costs, and lost profit for the
      remaining unexpired lease term (including option periods).

  - id: RF003
    name: Unrestricted assignment prohibition
    severity: high
    jurisdictions: ["ALL"]
    description: >
      Lease prohibits assignment without landlord consent, with no obligation
      on the landlord to act reasonably or respond within a defined timeframe.
      All Australian state Retail Leases Acts require landlords to act reasonably
      and respond within 28 days (deemed consent on non-response).
    trigger_keywords: ["assignment", "transfer", "consent", "not assign", "subletting", "sublet"]
    legislation_ref: "Retail Leases Act 1994 (NSW) s.41 | Retail Shop Leases Act 1994 (QLD)"
    recommended_action: >
      Add 'not to be unreasonably withheld or delayed' to the consent requirement.
      Include a 28-day deemed-consent provision. Remove any clause allowing the
      landlord to demand a premium or key money as a condition of consent.

  - id: RF004
    name: Excessive make-good obligations
    severity: high
    jurisdictions: ["ALL"]
    description: >
      Make-good clause requires tenant to return premises to original condition
      regardless of normal wear and tear, or to restore landlord's fitout.
      No exclusion for fair wear and tear is a critical gap.
    trigger_keywords: ["make good", "make-good", "reinstate", "original condition", "fitout", "strip out", "restore"]
    legislation_ref: "Retail Leases Act 1994 (NSW) s.16"
    recommended_action: >
      Negotiate explicit fair wear and tear exclusion. Commission a condition
      report with photographs at commencement. Secure the right to offer a
      cash settlement in lieu of physical make-good works. Ensure consent to
      alterations constitutes waiver of make-good for those alterations.

  - id: RF005
    name: Capital expenditure in outgoings
    severity: high
    jurisdictions: ["ALL"]
    description: >
      Tenant is liable for outgoings that include capital expenditure items
      such as roof replacement, structural repairs, lift replacement, or new
      plant and equipment. Capital expenditure is not recoverable in any
      Australian jurisdiction.
    trigger_keywords: ["outgoings", "capital expenditure", "structural", "plant and equipment", "roof", "lifts", "escalators"]
    legislation_ref: "Retail Leases Act 1994 (NSW) s.12 | Retail Leases Act 2003 (VIC) s.38"
    recommended_action: >
      Add explicit exclusion for capital expenditure from recoverable outgoings.
      Define capital expenditure as any work that extends the useful life of
      a building asset or is a structural repair. Retain right to audit
      outgoings annually and dispute within 60 days of reconciliation statement.

  - id: RF005b
    name: Land tax in outgoings — VIC (void by statute)
    severity: high
    jurisdictions: ["VIC"]
    description: >
      Land tax is absolutely prohibited as a recoverable outgoing under the
      Retail Leases Act 2003 (VIC) s.23. Any lease clause requiring a VIC
      tenant to pay land tax is void and of no effect, regardless of how it
      is worded. Tenants should cease paying and seek a refund immediately.
    trigger_keywords: ["land tax", "outgoings", "rates and taxes", "government charges"]
    legislation_ref: "Retail Leases Act 2003 (VIC) s.23"
    recommended_action: >
      Remove the land tax obligation entirely. The clause is legally void in Victoria.
      Seek a refund of any land tax already paid and cease future payments immediately.

  - id: RF005c
    name: Land tax charged on portfolio basis
    severity: high
    jurisdictions: ["NSW", "QLD", "SA", "WA", "TAS", "ACT", "NT"]
    description: >
      Land tax is charged on the landlord's entire property portfolio rather
      than on a single-holding basis. This inflates the tenant's share and is
      prohibited in NSW. In QLD it must be disclosed pre-execution and
      calculated on a single-tenancy basis.
    trigger_keywords: ["land tax", "portfolio", "total landholding", "aggregate"]
    legislation_ref: "Retail Leases Act 1994 (NSW) s.12"
    recommended_action: >
      Require land tax to be calculated on a single-holding basis only.
      Demand the landlord provide documentary evidence of the single-holding calculation.

  - id: RF006
    name: Unrestricted relocation right
    severity: medium
    jurisdictions: ["ALL"]
    description: >
      Landlord has an unfettered right to relocate the tenant within the
      building or centre without adequate notice, comparable premises,
      or compensation for disruption and relocation costs.
    trigger_keywords: ["relocation", "relocate", "alternative premises", "move", "new premises"]
    legislation_ref: "Retail Leases Act 1994 (NSW) s.34A"
    recommended_action: >
      Require minimum 3-month written notice. New premises must be comparable
      in size, location, and configuration. Landlord must pay all relocation
      costs and compensate for trade disruption during the move.

  - id: RF007
    name: Personal guarantee without cap
    severity: high
    jurisdictions: ["ALL"]
    description: >
      Directors or individuals are required to provide unlimited personal
      guarantees over the full lease term without any monetary cap, time
      limit, or sunset clause. Market standard is a 6-month rent cap with
      a 2-year sunset on clean payment history.
    trigger_keywords: ["personal guarantee", "guarantee", "guarantor", "indemnify", "jointly and severally"]
    legislation_ref: null
    recommended_action: >
      Cap the guarantee at 6-12 months' total rent (base + outgoings estimate).
      Add a sunset clause releasing the guarantee after 24 months of clean payment.
      Limit scope to base rent only — exclude make-good, legal costs, outgoings.

  - id: RF008
    name: Turnover rent with low base threshold
    severity: medium
    jurisdictions: ["ALL"]
    description: >
      Turnover rent clause kicks in at a threshold that is unrealistically low
      relative to the tenant's expected trading performance, resulting in the
      landlord sharing upside without any downside risk sharing.
    trigger_keywords: ["turnover rent", "percentage rent", "gross turnover", "base rent", "natural breakpoint"]
    legislation_ref: null
    recommended_action: >
      Set the turnover breakpoint at or above the tenant's realistic annual
      revenue forecast. Negotiate confidentiality protections for turnover data.

  - id: RF009
    name: Holdover at penalty rate
    severity: medium
    jurisdictions: ["ALL"]
    description: >
      Lease specifies that holding over after expiry is at a substantially
      higher rent rate (e.g. 150-200% of passing rent) with little or no
      notice requirement, creating punitive exit pressure.
    trigger_keywords: ["holdover", "overholding", "holding over", "month to month", "double rent"]
    legislation_ref: null
    recommended_action: >
      Negotiate holdover to revert to month-to-month at the passing contract rent.
      If a penalty rate is unavoidable, cap it at 110-115%.

  - id: RF010
    name: No exclusivity in retail centre
    severity: medium
    jurisdictions: ["ALL"]
    description: >
      Lease in a shopping centre or multi-tenancy building has no exclusivity
      provision preventing the landlord from leasing to direct competitors in
      the same product/service category.
    trigger_keywords: ["exclusivity", "exclusive", "competing business", "similar business", "permitted use"]
    legislation_ref: null
    recommended_action: >
      Negotiate an exclusivity clause for your specific product/service
      category within the centre or building precinct.

  - id: RF011
    name: Option to renew — inadequate exercise window
    severity: high
    jurisdictions: ["ALL"]
    description: >
      Option to renew exercise window is too short (less than 3 months) or
      the lease does not require the landlord to notify the tenant when the
      window opens. Missing an option deadline is generally irreversible.
    trigger_keywords: ["option", "option to renew", "renewal", "exercise", "notice period", "option period"]
    legislation_ref: "Retail Leases Act 1994 (NSW) s.44"
    recommended_action: >
      Negotiate a 6-9 month exercise window before expiry. Require the landlord
      to give written notice at least 3 months before the window opens.
      Set a calendar alert well before the window — this is the single most
      time-critical obligation in any lease.

  - id: RF012
    name: No outgoings audit right
    severity: medium
    jurisdictions: ["ALL"]
    description: >
      Lease does not give the tenant the right to audit the landlord's outgoings
      calculations, or does not require the landlord to provide an annual
      reconciliation statement. Without audit rights, overcharges go undetected.
    trigger_keywords: ["outgoings", "management fee", "administration fee", "reconciliation", "estimate", "audit"]
    legislation_ref: "Retail Leases Act 2003 (VIC) s.38 | Retail Shop Leases Act 1994 (QLD) s.37"
    recommended_action: >
      Require: (1) annual reconciliation within 3 months of EOFY; (2) right to
      inspect records within 60 days of the statement; (3) right to appoint an
      independent auditor if overcharge exceeds 5%; (4) landlord reimburses
      audit cost if overcharge is confirmed.

  - id: RF013
    name: Key money or premium for consent
    severity: high
    jurisdictions: ["ALL"]
    description: >
      Landlord charges a fee, premium, or key money as a condition of granting
      the lease, renewing it, or consenting to assignment. Key money is
      prohibited in VIC by statute and is restricted or challengeable in all
      other Australian jurisdictions.
    trigger_keywords: ["key money", "premium", "goodwill", "consent fee", "assignment fee", "renewal premium"]
    legislation_ref: "Retail Leases Act 2003 (VIC) — Key Money Prohibition"
    recommended_action: >
      Refuse payment. In VIC, report to Consumer Affairs Victoria — the landlord
      has committed a criminal offence. In other states, challenge under ACL
      unconscionable conduct provisions.
      s prohibited in NSW. In QLD it must be disclosed pre-execution and
      calculated on a single-tenancy basis.
    trigger_keywords: ["land tax", "portfolio", "total landholding", "aggregate"]
    legislation_ref: "Retail Leases Act 1994 (NSW) s.12"
    recommended_action: >
      Require land tax to be calculated on a single-holding basis only.
      Demand the landlord provide documentary evidence of the single-holding calculation.

